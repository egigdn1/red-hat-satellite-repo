---
# Playbook to set the hostname on Ubuntu servers.
#
# Override the hostname per host via inventory or Red Hat Satellite
# host parameters, e.g.:
#   ansible-playbook set_hostname_ubuntu.yml -e "set_hostname_name=web01.example.local"
#
- name: Set hostname on Ubuntu servers
  hosts: all
  become: true
  roles:
    - role: set_hostname_ubuntu
